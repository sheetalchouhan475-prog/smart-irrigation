<!DOCTYPE html>
<html>
<head>
    <title>Smart Farming Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #e8f5e9;
        }

        .card {
            display: inline-block;
            padding: 15px;
            margin: 10px;
            background: white;
            border-radius: 10px;
            width: 150px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            color: green;
        }
    </style>
</head>

<body>

<h1>🌱 Smart Farming Dashboard</h1>

<!-- 🔹 LIVE CARDS -->
<div class="card">
    <h3>Moisture</h3>
    <p id="m">0</p>
</div>

<div class="card">
    <h3>Temperature</h3>
    <p id="t">0</p>
</div>

<div class="card">
    <h3>Humidity</h3>
    <p id="h">0</p>
</div>

<div class="card">
    <h3>Status</h3>
    <p id="s">OFF</p>
</div>

<!-- 🔹 CHART -->
<canvas id="chart" width="400" height="200"></canvas>

<script>
let ctx = document.getElementById("chart").getContext("2d");

let chart = new Chart(ctx, {
    type: "bar",
    data: {
        labels: ["Moisture", "Temperature", "Humidity"],
        datasets: [{
            label: "Live Sensor Data",
            data: [0, 0, 0],
            backgroundColor: ["green", "red", "blue"]
        }]
    }
});

async function updateChart() {

    let response = await fetch("/chart-data");
    let data = await response.json();

    // 🔥 update graph
    chart.data.datasets[0].data = data.values;
    chart.update();

    // 🔥 update cards
    document.getElementById("m").innerText = data.values[0];
    document.getElementById("t").innerText = data.values[1];
    document.getElementById("h").innerText = data.values[2];
    document.getElementById("s").innerText = data.status;
}

// 🔥 every 3 seconds update
setInterval(updateChart, 3000);

</script>

</body>
</html>
